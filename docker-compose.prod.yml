version: "3.9"

# Production override — adds PostgreSQL and removes source mounts.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://infinite_gist:infinite_gist@db:5432/infinite_gist
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: infinite_gist
      POSTGRES_PASSWORD: infinite_gist
      POSTGRES_DB: infinite_gist
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infinite_gist"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlite_data:
  postgres_data:
